services:
  postgres:
    image: postgres:17-alpine
    container_name: remi-bloom-db
    environment:
      POSTGRES_USER: remi_bloom
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      POSTGRES_DB: remi_bloom
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remi_bloom"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    image: remi-bloom:local
    container_name: remi-bloom
    ports:
      - "4131:4131"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://remi_bloom:${DB_PASSWORD:-change_me_in_production}@postgres:5432/remi_bloom
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:4131}
      REMI_BLOOM_SEED_SECRET: ${REMI_BLOOM_SEED_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4131/api/ping',{method:'HEAD'}).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: remi-bloom-proxy
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
