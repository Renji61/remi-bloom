<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - REMI Bloom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0e1513;
      color: #dde4e1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 320px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #57f1db, #2dd4bf);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px;
      color: #bacac5;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retry-btn {
      background: #57f1db;
      color: #003731;
      border: none;
      border-radius: 9999px;
      padding: 12px 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .retry-btn:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌱</div>
    <h1>You're Offline</h1>
    <p>REMI Bloom needs a network connection to load new content. Your locally saved data is still available.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      Try Again
    </button>
  </div>
</body>
</html>
